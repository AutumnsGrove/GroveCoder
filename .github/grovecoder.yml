# GroveCoder Configuration

version: "1"

# Safety limits
safety:
  # Maximum iterations before stopping
  maxIterations: 25

  # Maximum cost in USD before stopping
  maxCostUSD: 2.0

  # Timeout in minutes
  timeoutMinutes: 15

# Protected paths (override defaults to allow main branch for testing)
protectedPaths:
  branches: []  # Empty array = no protected branches

# Model configuration
model:
  provider: claude
  name: claude-sonnet-4-5-20250929
  maxTokens: 8192
