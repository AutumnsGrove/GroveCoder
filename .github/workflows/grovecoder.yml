name: GroveCoder PR Remediation

on:
  issue_comment:
    types: [created]

# Ensure only one GroveCoder run per PR at a time
concurrency:
  group: grovecoder-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  remediate:
    # Only run on PR comments (not issue comments)
    # Only run on comments from Claude bot
    if: |
      github.event.issue.pull_request != null &&
      (github.event.comment.user.login == 'claude[bot]' ||
       github.event.comment.user.login == 'github-actions[bot]' ||
       contains(github.event.comment.body, '## Issues & Concerns') ||
       contains(github.event.comment.body, '## Code Review'))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    timeout-minutes: 15

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.issue.pull_request.url }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);
            return pr.data;

      - name: Checkout PR head
        run: |
          git checkout ${{ steps.pr.outputs.head_ref }}
          git pull origin ${{ steps.pr.outputs.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run GroveCoder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_BRANCH: ${{ steps.pr.outputs.head_ref }}
        run: node dist/index.js

      - name: Configure git
        run: |
          git config user.name "GroveCoder[bot]"
          git config user.email "grovecoder[bot]@users.noreply.github.com"

      - name: Push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "fix: apply automated fixes from GroveCoder

            Addresses review comments from PR #${{ github.event.issue.number }}

            Co-authored-by: Claude <claude@anthropic.com>"
            git push origin ${{ steps.pr.outputs.head_ref }}
          else
            echo "No changes to commit"
          fi
